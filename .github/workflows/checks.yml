name: Repository checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/pages-requirements.txt
      - name: Install documentation dependencies
        run: python -m pip install -r .github/pages-requirements.txt
      - name: Validate repository structure and files
        run: python tools/validate-repository.py
      - name: Run ShellCheck
        run: git ls-files -z '*.sh' | xargs -0 -r shellcheck --severity=error
      - name: Build documentation strictly
        run: |
          python tools/prepare-pages.py --output _pages-src --config-output _pages-mkdocs.yml
          mkdocs build --strict --config-file _pages-mkdocs.yml --site-dir _site
